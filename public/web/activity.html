<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Activity · Workspace</title>
<link rel="stylesheet" href="../global.css">
<style>
  .page { max-width: 920px; margin: 0 auto; padding: clamp(1.25rem,3vw,2.5rem) clamp(1rem,2.5vw,2rem); }
  .topbar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
  .topbar .grow { flex: 1; }
  .filter-row { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-4); }
  .pill {
    padding: 0.4rem 0.8rem;
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-2); background: var(--surface);
    border: var(--border-strong); cursor: pointer;
  }
  .pill.is-active { background: var(--ink); color: var(--surface); border-color: var(--ink); }
  .pill:hover { border-color: var(--ink); }
  .feed { display: flex; flex-direction: column; gap: var(--space-3); }
  .event {
    background: var(--surface); border: var(--border-strong);
    padding: var(--space-3) var(--space-4);
  }
  .event .row1 {
    display: flex; justify-content: space-between; gap: var(--space-3);
    margin-bottom: 4px;
  }
  .event .who {
    font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600; color: var(--ink);
  }
  .event .when {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    color: var(--ink-3); letter-spacing: 0.04em;
  }
  .event .what {
    font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500;
    color: var(--ink-2); letter-spacing: 0.02em;
  }
  .event .pay {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    color: var(--ink-4); margin-top: 4px; word-break: break-word;
  }
  .badge-svc {
    display: inline-block; padding: 1px 6px; margin-right: 6px;
    border: var(--border-strong);
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink); background: var(--surface-2); vertical-align: 1px;
  }
  .empty { padding: var(--space-6); text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--ink-5); }
</style>
</head>
<body>
<div class="page">
  <header class="block-head stack">
    <div class="topbar">
      <span class="eyebrow">Workspace</span>
      <span class="grow"></span>
      <a href="index.html" class="btn btn--ghost">Sheet</a>
      <a href="messages.html" class="btn btn--ghost">Messages</a>
      <a href="money.html" class="btn btn--ghost">Money</a>
      <a href="reports.html" class="btn btn--ghost">Reports</a>
    </div>
    <h1 class="h1">Activity <em>feed</em>.</h1>
    <p class="lede">Every write across the workspace, in order. Pulled live from the witness log — auth, tasks, comments, scores, votes, recommendations, files.</p>
  </header>

  <main class="mt-6">
    <div class="filter-row" id="filters"></div>
    <div class="feed" id="feed"><div class="empty">loading…</div></div>
  </main>
</div>

<script>
const _LOCAL = ['127.0.0.1', 'localhost'].includes(location.hostname);
const API = { team: _LOCAL ? 'http://127.0.0.1:8011' : '/api/team' };

const SERVICES = ['all', 'team', 'netdef', 'money', 'judge', 'container'];
let activeFilter = 'all';

const $ = s => document.querySelector(s);

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function describe(action, payload) {
  const a = action || '';
  if (a === 'task.status_changed') return `${payload?.from || '?'} → ${payload?.to || '?'}`;
  if (a === 'task.created')        return `"${payload?.title || ''}" · weight ${payload?.weight ?? '—'}`;
  if (a === 'task.edited')         return Object.entries(payload || {}).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(' ');
  if (a === 'comment.added')       return `${(payload?.body || '').slice(0, 140)}`;
  if (a === 'peer_score.added')    return `score ${payload?.score}/100${payload?.was_unfinished ? ' · unfinished' : ''}`;
  if (a === 'kpi.recorded')        return `${payload?.metric} ${payload?.value}/${payload?.target} → ${payload?.score?.toFixed?.(1)}`;
  if (a === 'recommendation.created') return `${(payload?.body || '').slice(0, 140)}`;
  if (a === 'message.sent')        return `→ ${payload?.message_id}`;
  if (a === 'attachment.uploaded') return `${payload?.filename} · ${(payload?.size_bytes/1024).toFixed(1)} KB`;
  if (a === 'ballot.cast')         return `${payload?.choice}`;
  if (a === 'vote.opened')         return `${(payload?.proposal || '').slice(0,140)}`;
  if (a === 'vote.closed')         return `${payload?.status} · yes ${payload?.yes} / no ${payload?.no} / abs ${payload?.abstain}`;
  if (a === 'transaction.proposed') return `${payload?.amount} ${payload?.currency} · ${payload?.transaction_type}`;
  if (a === 'auth.login')          return `@${payload?.handle}`;
  return '';
}

async function load() {
  const url = activeFilter === 'all' ? '/activity' : `/activity?service_filter=${activeFilter}`;
  try {
    const res = await fetch(API.team + url, { credentials: 'include' });
    if (!res.ok) throw new Error(res.status);
    const events = await res.json();
    render(events);
  } catch (err) {
    $('#feed').innerHTML = `<div class="empty">could not load activity (${err.message || err})</div>`;
  }
}

function render(events) {
  const el = $('#feed');
  if (!events.length) { el.innerHTML = `<div class="empty">no activity yet</div>`; return; }
  el.innerHTML = events.map(e => {
    const who = e.actor_name ? `${esc(e.actor_name)}${e.actor_handle ? ` <span class="text-faint" style="font-family:var(--font-mono);font-size:11px">@${esc(e.actor_handle)}</span>` : ''}` : '<em style="font-family:var(--font-serif);color:var(--ink-5)">system</em>';
    const when = (e.ts || '').replace('T', ' ').slice(0, 19);
    const detail = esc(describe(e.action, e.payload));
    return `<div class="event">
      <div class="row1"><div class="who">${who}</div><div class="when">${when}</div></div>
      <div class="what"><span class="badge-svc">${esc(e.service)}</span>${esc(e.action)}</div>
      ${detail ? `<div class="pay">${detail}</div>` : ''}
    </div>`;
  }).join('');
}

function renderFilters() {
  $('#filters').innerHTML = SERVICES.map(s =>
    `<button class="pill ${s === activeFilter ? 'is-active' : ''}" data-svc="${s}">${s}</button>`
  ).join('');
  document.querySelectorAll('#filters .pill').forEach(p =>
    p.addEventListener('click', () => {
      activeFilter = p.dataset.svc;
      renderFilters();
      load();
    })
  );
}

renderFilters();
load();
setInterval(load, 30000);
</script>
</body>
</html>
