<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reports · Workspace</title>
<link rel="stylesheet" href="../global.css">
<style>
  .page { max-width: 1200px; margin: 0 auto; padding: clamp(1.25rem,3vw,2.5rem) clamp(1rem,2.5vw,2rem); }
  .topbar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
  .topbar .grow { flex: 1; }

  .period-pick {
    display: inline-flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border: var(--border-strong);
  }
  .period-pick label {
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4);
  }
  .period-pick input {
    border: none; padding: 0;
    font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm);
    background: transparent; outline: none;
  }

  .grid {
    display: grid; grid-template-columns: minmax(160px, 1fr) repeat(5, minmax(110px, 1fr));
    gap: 2px; background: var(--ink); border: var(--border-ink);
  }
  .gh {
    background: var(--surface-2); padding: var(--space-3) var(--space-4);
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-2);
  }
  .gc {
    background: var(--surface); padding: var(--space-3) var(--space-4);
    font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600;
  }
  .gc.name { font-family: var(--font-sans); font-weight: 600; color: var(--ink); }
  .gc.score {
    position: relative;
    background: linear-gradient(to right, var(--surface-3) var(--pct), var(--surface) var(--pct));
  }

  .bars {
    display: grid; grid-template-columns: 220px 1fr 60px; gap: var(--space-3); align-items: center;
    padding: var(--space-2) 0; border-top: var(--border);
  }
  .bars .who { font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm); }
  .bars .track {
    height: 10px; background: var(--surface-2); border: var(--border-strong); position: relative;
  }
  .bars .track .fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: var(--ink); transition: width 0.4s ease;
  }
  .bars .num {
    font-family: var(--font-mono); font-weight: 700; font-size: var(--text-sm);
    text-align: right; font-variant-numeric: tabular-nums;
  }

  .section { margin-top: var(--space-7); }
  .section .col-head {
    display: flex; align-items: baseline; justify-content: space-between;
    font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-2);
    padding-bottom: var(--space-3); border-bottom: var(--border-strong);
    margin-bottom: var(--space-3);
  }
  .empty { padding: var(--space-6); text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--ink-5); }
</style>
</head>
<body>
<div class="page">
  <header class="block-head stack">
    <div class="topbar">
      <span class="eyebrow">Workspace</span>
      <span class="grow"></span>
      <a href="index.html" class="btn btn--ghost">Sheet</a>
      <a href="activity.html" class="btn btn--ghost">Activity</a>
      <a href="messages.html" class="btn btn--ghost">Messages</a>
      <a href="money.html" class="btn btn--ghost">Money</a>
    </div>
    <h1 class="h1">Team <em>report</em>.</h1>
    <p class="lede">Performance scores combine task completion, KPI averages, and peer review. Pick any month.</p>
    <div class="cluster" style="margin-top: var(--space-3);">
      <span class="period-pick">
        <label>period</label>
        <input id="periodInput" type="month">
      </span>
    </div>
  </header>

  <main class="mt-6">
    <div class="section">
      <div class="col-head">Performance <span class="counter" id="totalLabel"></span></div>
      <div id="grid"><div class="empty">loading…</div></div>
    </div>
    <div class="section">
      <div class="col-head">Score bars</div>
      <div id="bars"></div>
    </div>
  </main>
</div>

<script>
const _LOCAL = ['127.0.0.1', 'localhost'].includes(location.hostname);
const API = { team: _LOCAL ? 'http://127.0.0.1:8011' : '/api/team' };
const $ = s => document.querySelector(s);

async function api(svc, path) {
  const res = await fetch(API[svc] + path, { credentials: 'include' });
  if (!res.ok) throw { status: res.status };
  return res.json();
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load(period) {
  try {
    const data = await api('team', `/reports/team?period=${period}`);
    render(data);
  } catch (err) {
    $('#grid').innerHTML = `<div class="empty">could not load report (${err.status || '?'})</div>`;
  }
}

function render(data) {
  const workers = data.workers || [];
  $('#totalLabel').textContent = String(workers.length).padStart(3,'0');

  const head = `
    <div class="gh">member</div>
    <div class="gh">score</div>
    <div class="gh">tasks w/ done</div>
    <div class="gh">kpi avg</div>
    <div class="gh">peer avg</div>
    <div class="gh">handle</div>`;
  const rows = workers.map(w => `
    <div class="gc name">${esc(w.name)}${w.is_admin ? ' <span style="font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--ink-4)">· LEADER</span>' : ''}</div>
    <div class="gc score" style="--pct: ${Math.min(100, Math.max(0, w.score))}%">${w.score.toFixed(1)}</div>
    <div class="gc">${w.done_weight}/${w.total_weight}</div>
    <div class="gc">${w.kpi_avg.toFixed(1)} <span style="color:var(--ink-4);font-weight:500">(${w.kpi_count})</span></div>
    <div class="gc">${w.peer_avg.toFixed(1)} <span style="color:var(--ink-4);font-weight:500">(${w.peer_count})</span></div>
    <div class="gc" style="color:var(--ink-3);font-weight:500">@${esc(w.handle)}</div>
  `).join('');
  $('#grid').innerHTML = `<div class="grid">${head}${rows}</div>`;

  $('#bars').innerHTML = workers
    .slice()
    .sort((a,b) => b.score - a.score)
    .map(w => `
      <div class="bars">
        <div class="who">${esc(w.name)}</div>
        <div class="track"><div class="fill" style="width: ${Math.min(100, Math.max(0, w.score))}%"></div></div>
        <div class="num">${w.score.toFixed(1)}</div>
      </div>`).join('');
}

function defaultPeriod() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

const p = defaultPeriod();
$('#periodInput').value = p;
$('#periodInput').addEventListener('change', e => load(e.target.value));
load(p);
setInterval(() => load($('#periodInput').value), 30000);
</script>
</body>
</html>
