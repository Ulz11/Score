<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Money · Workspace</title>
<link rel="stylesheet" href="../global.css">
<style>
  .page { max-width: 1200px; margin: 0 auto; padding: clamp(1.25rem,3vw,2.5rem) clamp(1rem,2.5vw,2rem); }
  .topbar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
  .topbar .grow { flex: 1; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }

  .col-head {
    display: flex; align-items: baseline; justify-content: space-between;
    font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-2);
    padding-bottom: var(--space-3); border-bottom: var(--border-strong);
    margin-bottom: var(--space-3);
  }
  .card {
    background: var(--surface); border: var(--border-strong);
    padding: var(--space-4); margin-bottom: var(--space-3);
  }
  .card .title { font-family: var(--font-serif); font-weight: 600; font-size: 1.15rem; }
  .card .meta {
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 500;
    color: var(--ink-3); letter-spacing: 0.04em; margin-top: 4px;
  }
  .card .body { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500; margin-top: var(--space-2); }

  .vote { background: var(--surface-2); border: var(--border-strong); padding: var(--space-3); margin-top: var(--space-3); }
  .vote .prop { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600; }
  .vote .tally {
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); margin-top: 6px;
  }
  .vote .tally .yes { color: var(--ok); }
  .vote .tally .no  { color: var(--warn); }
  .vote .controls { display: flex; gap: var(--space-2); margin-top: var(--space-3); }
  .vote .controls button {
    flex: 1; padding: 0.4rem 0;
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-2); background: var(--surface);
    border: var(--border-strong); cursor: pointer;
  }
  .vote .controls button:hover { background: var(--ink); color: var(--surface); border-color: var(--ink); }
  .vote .controls button.yes:hover { background: var(--ok); border-color: var(--ok); color: var(--surface); }
  .vote .controls button.no:hover  { background: var(--warn); border-color: var(--warn); color: var(--surface); }
  .vote .status-pill {
    display: inline-block; padding: 1px 6px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    border: var(--border-strong);
  }
  .vote .status-pill.passed { background: var(--ok); color: var(--surface); border-color: var(--ok); }
  .vote .status-pill.failed { background: var(--warn); color: var(--surface); border-color: var(--warn); }
  .vote .status-pill.open   { background: var(--ink); color: var(--surface); border-color: var(--ink); }

  .form {
    background: var(--surface-2); border: var(--border-strong);
    padding: var(--space-4); margin-bottom: var(--space-4);
  }
  .form .row { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .form .row > * { flex: 1; min-width: 160px; }
  .form label.field {
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2);
  }
  .form input, .form select, .form textarea {
    padding: 0.5rem 0.7rem;
    font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500;
    color: var(--ink); background: var(--surface); border: var(--border-strong);
  }
  .form input:focus, .form select:focus, .form textarea:focus { outline: none; border-color: var(--ink); }
  .form textarea { min-height: 60px; font-family: var(--font-mono); resize: vertical; }

  .tx-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: var(--space-3);
    padding: var(--space-2) var(--space-3);
    border: var(--border);
    margin-bottom: 4px;
  }
  .tx-row .amt {
    font-family: var(--font-mono); font-weight: 700; font-size: var(--text-sm);
    text-align: right;
  }
  .tx-row .status {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-2);
  }
  .tx-row .status.committed { color: var(--ok); }
  .tx-row .status.rejected  { color: var(--warn); }

  .empty { padding: var(--space-4); text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--ink-5); }
</style>
</head>
<body>
<div class="page">
  <header class="block-head stack">
    <div class="topbar">
      <span class="eyebrow">Workspace</span>
      <span class="grow"></span>
      <a href="index.html" class="btn btn--ghost">Sheet</a>
      <a href="activity.html" class="btn btn--ghost">Activity</a>
      <a href="messages.html" class="btn btn--ghost">Messages</a>
      <a href="reports.html" class="btn btn--ghost">Reports</a>
    </div>
    <h1 class="h1">Money &amp; <em>votes</em>.</h1>
    <p class="lede">Meetings, binding-quorum votes, and transactions. Members cast ballots; admin closes votes; passed votes commit their linked transaction.</p>
  </header>

  <main class="mt-6">
    <div class="cols">
      <section>
        <div class="col-head">Meetings <span id="mtgCount" class="counter"></span></div>
        <div id="newMtgWrap"></div>
        <div id="meetings"><div class="empty">loading…</div></div>
      </section>
      <section>
        <div class="col-head">Transactions <span id="txCount" class="counter"></span></div>
        <div id="newTxWrap"></div>
        <div id="transactions"><div class="empty">loading…</div></div>
      </section>
    </div>
  </main>
</div>

<script>
const _LOCAL = ['127.0.0.1', 'localhost'].includes(location.hostname);
const API = {
  team:  _LOCAL ? 'http://127.0.0.1:8011' : '/api/team',
  money: _LOCAL ? 'http://127.0.0.1:8013' : '/api/money',
};
const $ = s => document.querySelector(s);

async function api(svc, path, opts = {}) {
  const init = { method: opts.method || 'GET', headers: {}, credentials: 'include' };
  if (opts.body !== undefined) {
    init.method = opts.method || 'POST';
    init.body = JSON.stringify(opts.body);
    init.headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(API[svc] + path, init);
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) throw { status: res.status, data };
  return data;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const state = { me: null, meetings: [], transactions: [], voteDetails: {} };

async function boot() {
  try {
    state.me = await api('team', '/auth/whoami');
  } catch { state.me = { authenticated: false }; }
  renderForms();
  await refresh();
  setInterval(refresh, 25000);
}

async function refresh() {
  try {
    state.meetings = await api('money', '/meetings');
    state.transactions = await api('money', '/transactions');
    // Hydrate vote details per meeting
    for (const m of state.meetings) {
      try {
        const det = await api('money', `/meetings/${m.id}`);
        m.votes = det.votes || [];
      } catch { m.votes = []; }
    }
    // Hydrate vote tallies (ballots) for open votes
    for (const m of state.meetings) {
      for (const v of (m.votes || [])) {
        if (v.status === 'open' || v.status === 'passed' || v.status === 'failed') {
          try { state.voteDetails[v.id] = await api('money', `/votes/${v.id}`); }
          catch { state.voteDetails[v.id] = { ballots: [], tally: { yes: 0, no: 0, abstain: 0 } }; }
        }
      }
    }
  } catch (err) {
    console.error(err);
  }
  renderMeetings();
  renderTransactions();
}

function renderForms() {
  if (state.me?.is_admin) {
    $('#newMtgWrap').innerHTML = `
      <form class="form" id="mtgForm">
        <div style="margin-bottom: var(--space-3); font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2);">+ new meeting</div>
        <div class="row">
          <label class="field">title <input id="mtgTitle" type="text" required></label>
          <label class="field">scheduled at <input id="mtgWhen" type="datetime-local" required></label>
        </div>
        <label class="field" style="margin-top: var(--space-3)">agenda
          <textarea id="mtgAgenda"></textarea>
        </label>
        <div style="margin-top: var(--space-3); text-align: right;">
          <button class="btn btn--primary" type="submit">create meeting</button>
        </div>
      </form>`;
    $('#mtgForm').addEventListener('submit', async e => {
      e.preventDefault();
      const title = $('#mtgTitle').value.trim();
      const scheduled_at = $('#mtgWhen').value;
      const agenda = $('#mtgAgenda').value.trim();
      try {
        await api('money', '/meetings', { body: { title, agenda, scheduled_at, actor_id: state.me.worker_id } });
        $('#mtgForm').reset();
        refresh();
      } catch (err) { alert(`error: ${err.data?.detail || err.status}`); }
    });

    $('#newTxWrap').innerHTML = `
      <form class="form" id="txForm">
        <div style="margin-bottom: var(--space-3); font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2);">+ propose transaction</div>
        <div class="row">
          <label class="field">amount <input id="txAmt" type="number" step="0.01" required></label>
          <label class="field">currency
            <select id="txCur"><option>USD</option><option>EUR</option><option>MNT</option><option>GBP</option></select>
          </label>
          <label class="field">type
            <select id="txType">
              <option value="deposit">deposit</option>
              <option value="withdrawal">withdrawal</option>
              <option value="refund">refund</option>
              <option value="transfer">transfer</option>
              <option value="loan_payment">loan payment</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top: var(--space-3);">
          <label class="field">sender <input id="txFrom" type="text" required></label>
          <label class="field">receiver <input id="txTo" type="text" required></label>
          <label class="field">when <input id="txWhen" type="datetime-local" required></label>
        </div>
        <div class="row" style="margin-top: var(--space-3);">
          <label class="field" style="flex: 2">location <input id="txLoc" type="text"></label>
          <label class="field">payment method
            <select id="txMethod">
              <option>cash</option><option>bank_transfer</option><option>card</option><option>crypto</option>
            </select>
          </label>
        </div>
        <div style="margin-top: var(--space-3); text-align: right;">
          <button class="btn btn--primary" type="submit">propose</button>
        </div>
      </form>`;
    $('#txForm').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await api('money', '/transactions', { body: {
          amount: Number($('#txAmt').value),
          currency: $('#txCur').value,
          transaction_type: $('#txType').value,
          sender_party: $('#txFrom').value.trim(),
          receiver_party: $('#txTo').value.trim(),
          occurred_at: $('#txWhen').value,
          location: $('#txLoc').value.trim() || null,
          payment_method: $('#txMethod').value,
          actor_id: state.me.worker_id,
        }});
        $('#txForm').reset();
        refresh();
      } catch (err) { alert(`error: ${err.data?.detail || err.status}`); }
    });
  }
}

function renderVote(v) {
  const det = state.voteDetails[v.id] || { tally: { yes: 0, no: 0, abstain: 0 }, ballots: [] };
  const t = det.tally;
  const myBallot = det.ballots?.find(b => b.voter_id === state.me?.worker_id);
  return `<div class="vote">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3)">
      <div class="prop">${esc(v.proposal_text)}</div>
      <span class="status-pill ${v.status}">${v.status}</span>
    </div>
    <div class="tally">
      <span class="yes">yes ${t.yes}</span> ·
      <span class="no">no ${t.no}</span> ·
      <span>abs ${t.abstain}</span> ·
      <span>quorum ${(t.yes + t.no + t.abstain)}/${v.quorum_required}</span>
    </div>
    ${v.status === 'open' && state.me?.authenticated && !myBallot ? `
      <div class="controls" data-vote="${v.id}">
        <button class="yes" data-choice="yes">vote yes</button>
        <button class="no"  data-choice="no">vote no</button>
        <button data-choice="abstain">abstain</button>
      </div>
    ` : myBallot ? `
      <div class="tally" style="margin-top:6px;color:var(--ink-3)">your ballot · ${myBallot.choice}</div>
    ` : ''}
    ${v.status === 'open' && state.me?.is_admin ? `
      <div style="text-align:right; margin-top: var(--space-2);">
        <button class="btn btn--ghost" data-close="${v.id}" style="padding: 4px 10px; font-size: 11px;">close vote</button>
      </div>
    ` : ''}
  </div>`;
}

function renderMeetings() {
  const el = $('#meetings');
  $('#mtgCount').textContent = String(state.meetings.length).padStart(3,'0');
  if (!state.meetings.length) { el.innerHTML = `<div class="empty">no meetings yet</div>`; return; }
  el.innerHTML = state.meetings.map(m => `
    <div class="card">
      <div class="title">${esc(m.title)}</div>
      <div class="meta">${m.scheduled_at?.replace('T',' ').slice(0,16)} · status: ${m.status}</div>
      ${m.agenda ? `<div class="body">${esc(m.agenda)}</div>` : ''}
      ${(m.votes || []).map(renderVote).join('')}
      ${state.me?.is_admin ? `
        <div style="text-align:right; margin-top: var(--space-3);">
          <button class="btn btn--ghost" data-open-vote="${m.id}" style="padding: 4px 10px; font-size: 11px;">+ open vote</button>
        </div>
      ` : ''}
    </div>`).join('');

  el.querySelectorAll('[data-vote] button').forEach(b => b.addEventListener('click', async ev => {
    const wrap = ev.target.closest('[data-vote]');
    const vid = wrap.dataset.vote;
    const choice = ev.target.dataset.choice;
    try {
      await api('money', `/votes/${vid}/ballots`, { body: { voter_id: state.me.worker_id, choice } });
      refresh();
    } catch (err) { alert(`error: ${err.data?.detail || err.status}`); }
  }));

  el.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', async () => {
    const vid = b.dataset.close;
    if (!confirm('Close this vote? This is irreversible and may commit/reject a linked transaction.')) return;
    try { await api('money', `/votes/${vid}/close`, { method: 'POST', body: {} }); refresh(); }
    catch (err) { alert(`error: ${err.data?.detail || err.status}`); }
  }));

  el.querySelectorAll('[data-open-vote]').forEach(b => b.addEventListener('click', async () => {
    const mid = b.dataset.openVote;
    const prop = prompt('Proposal text:');
    if (!prop) return;
    const quorum = parseInt(prompt('Quorum required (e.g. 3):', '3'), 10);
    if (!quorum) return;
    const linked = prompt('Linked transaction id (optional):', '');
    try {
      await api('money', `/meetings/${mid}/votes`, { body: {
        proposal_text: prop, quorum_required: quorum, majority_threshold: 0.5,
        linked_transaction_id: linked || null, actor_id: state.me.worker_id,
      }});
      refresh();
    } catch (err) { alert(`error: ${err.data?.detail || err.status}`); }
  }));
}

function renderTransactions() {
  const el = $('#transactions');
  $('#txCount').textContent = String(state.transactions.length).padStart(3,'0');
  if (!state.transactions.length) { el.innerHTML = `<div class="empty">no transactions yet</div>`; return; }
  el.innerHTML = state.transactions.map(t => `
    <div class="tx-row">
      <div>
        <div style="font-family:var(--font-sans);font-weight:600;font-size:var(--text-sm)">${esc(t.sender_party)} → ${esc(t.receiver_party)}</div>
        <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--ink-3);letter-spacing:0.04em;margin-top:2px">
          ${t.occurred_at?.replace('T',' ').slice(0,16)} · ${esc(t.transaction_type)} · ${esc(t.payment_method)}
        </div>
      </div>
      <div class="amt">${Number(t.amount).toLocaleString()} ${esc(t.currency)}</div>
      <div class="status ${esc(t.status)}">${esc(t.status)}<br><span style="font-weight:500;color:var(--ink-4);font-size:9px">${t.id.slice(0,8)}</span></div>
    </div>`).join('');
}

boot();
</script>
</body>
</html>
