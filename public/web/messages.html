<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Messages · Workspace</title>
<link rel="stylesheet" href="../global.css">
<style>
  .page { max-width: 1100px; margin: 0 auto; padding: clamp(1.25rem,3vw,2.5rem) clamp(1rem,2.5vw,2rem); }
  .topbar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
  .topbar .grow { flex: 1; }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    border: var(--border-ink);
    min-height: 540px;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    .layout .panel-right { display: none; }
    .layout.is-thread .panel-left { display: none; }
    .layout.is-thread .panel-right { display: flex; }
  }

  .panel-left {
    border-right: var(--border-strong);
    display: flex; flex-direction: column;
    background: var(--surface);
    min-height: 540px;
  }
  .panel-left .head {
    padding: var(--space-3) var(--space-4); border-bottom: var(--border-strong);
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2);
  }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv {
    padding: var(--space-3) var(--space-4); border-bottom: var(--border);
    cursor: pointer;
  }
  .conv:hover { background: var(--surface-2); }
  .conv.is-active { background: var(--ink); color: var(--surface); }
  .conv.is-active .preview, .conv.is-active .when { color: var(--ink-5); }
  .conv .name { font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm); }
  .conv .preview {
    font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 500;
    color: var(--ink-3); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv .when {
    font-family: var(--font-mono); font-size: 10px; color: var(--ink-4);
    letter-spacing: 0.04em; margin-top: 2px;
  }
  .conv .unread {
    display: inline-block; min-width: 16px; padding: 0 4px; margin-left: 4px;
    background: var(--ink); color: var(--surface); font-family: var(--font-mono);
    font-size: 10px; font-weight: 600; line-height: 14px; text-align: center;
  }

  .panel-right { display: flex; flex-direction: column; background: var(--bg); min-height: 540px; }
  .thread-head {
    padding: var(--space-3) var(--space-4); border-bottom: var(--border-strong);
    background: var(--surface);
    display: flex; align-items: center; gap: var(--space-3);
  }
  .thread-head .name { font-family: var(--font-serif); font-weight: 600; font-size: 1.15rem; }
  .back { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
          letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3);
          background: none; border: 0; cursor: pointer; }
  .back:hover { color: var(--ink); }

  .thread-body { flex: 1; overflow-y: auto; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
  .msg { max-width: 70%; padding: var(--space-2) var(--space-3); border: var(--border-strong); }
  .msg .meta { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--ink-4); letter-spacing: 0.04em; margin-bottom: 3px; }
  .msg .body { font-size: var(--text-sm); font-weight: 500; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .msg.mine { align-self: flex-end; background: var(--ink); color: var(--surface); border-color: var(--ink); }
  .msg.mine .meta { color: var(--ink-5); }

  .composer {
    border-top: var(--border-strong); padding: var(--space-3) var(--space-4);
    background: var(--surface);
    display: flex; gap: var(--space-2);
  }
  .composer textarea {
    flex: 1; min-height: 44px; max-height: 140px;
    padding: 0.5rem 0.7rem; resize: vertical;
    font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500;
    color: var(--ink); background: var(--surface); border: var(--border-strong);
  }
  .composer textarea:focus { outline: none; border-color: var(--ink); }

  .empty { padding: var(--space-6); text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--ink-5); }
  .login-prompt { padding: var(--space-6); text-align: center; }
  .login-prompt .h1 { font-size: 2.5rem; margin: 0 auto var(--space-4); }
</style>
</head>
<body>
<div class="page">
  <header class="block-head stack">
    <div class="topbar">
      <span class="eyebrow">Workspace</span>
      <span class="grow"></span>
      <a href="index.html" class="btn btn--ghost">Sheet</a>
      <a href="activity.html" class="btn btn--ghost">Activity</a>
      <a href="money.html" class="btn btn--ghost">Money</a>
      <a href="reports.html" class="btn btn--ghost">Reports</a>
    </div>
    <h1 class="h1">Direct <em>messages</em>.</h1>
    <p class="lede">Talk to teammates outside the task grid. Polls every 20s.</p>
  </header>

  <main class="mt-6" id="main">
    <div class="empty">loading…</div>
  </main>
</div>

<script>
const _LOCAL = ['127.0.0.1', 'localhost'].includes(location.hostname);
const API = { team: _LOCAL ? 'http://127.0.0.1:8011' : '/api/team' };
const $ = s => document.querySelector(s);

async function api(svc, path, opts = {}) {
  const init = { method: opts.method || 'GET', headers: {}, credentials: 'include' };
  if (opts.body !== undefined) {
    init.method = opts.method || 'POST';
    init.body = JSON.stringify(opts.body);
    init.headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(API[svc] + path, init);
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) throw { status: res.status, data };
  return data;
}

const state = { me: null, workers: [], inbox: [], openWith: null, thread: [] };

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function boot() {
  try {
    const me = await api('team', '/auth/whoami');
    if (!me.authenticated) {
      $('#main').innerHTML = `<div class="login-prompt">
        <span class="eyebrow">Sign in required</span>
        <h2 class="h1">Sign <em>in</em> to message.</h2>
        <p class="lede" style="margin: 0 auto;">Direct messages need an account.</p>
        <p style="margin-top: var(--space-4)"><a href="index.html" class="btn btn--primary">go to sheet to sign in</a></p>
      </div>`;
      return;
    }
    state.me = me;
    state.workers = await api('team', '/workers');
    renderShell();
    await refresh();
    setInterval(refresh, 20000);
  } catch (err) {
    $('#main').innerHTML = `<div class="empty">boot failed (${err.status || err})</div>`;
  }
}

async function refresh() {
  try {
    state.inbox = await api('team', '/messages/inbox');
  } catch { /* ignore */ }
  renderConvList();
  if (state.openWith) await openThread(state.openWith);
}

function renderShell() {
  $('#main').innerHTML = `
    <div class="layout" id="layout">
      <div class="panel-left">
        <div class="head">Conversations</div>
        <div class="conv-list" id="convList"></div>
      </div>
      <div class="panel-right" id="panelRight"></div>
    </div>`;
}

function convSummary() {
  // Build summary: group messages by other party (latest first)
  const map = new Map();
  for (const m of state.inbox) {
    const other = m.from_id;
    if (!map.has(other)) {
      const w = state.workers.find(x => x.id === other);
      map.set(other, {
        with_id: other,
        with_name: w?.name || `#${other.slice(0,8)}`,
        latest: m.body, when: m.created_at,
        unread: 0,
      });
    }
    if (!m.is_read) map.get(other).unread += 1;
  }
  return Array.from(map.values()).sort((a,b) => a.when < b.when ? 1 : -1);
}

function renderConvList() {
  const convs = convSummary();
  const list = $('#convList');
  if (!list) return;

  // Also list every worker so we can start a new convo
  const known = new Set(convs.map(c => c.with_id));
  const others = state.workers.filter(w => w.id !== state.me.worker_id && !known.has(w.id))
    .map(w => ({ with_id: w.id, with_name: w.name, latest: '', when: '', unread: 0 }));

  const all = [...convs, ...others];
  if (!all.length) { list.innerHTML = `<div class="empty">no teammates yet</div>`; return; }

  list.innerHTML = all.map(c => `
    <div class="conv${c.with_id === state.openWith ? ' is-active' : ''}" data-with="${c.with_id}">
      <div class="name">${esc(c.with_name)}${c.unread ? `<span class="unread">${c.unread}</span>` : ''}</div>
      ${c.latest ? `<div class="preview">${esc(c.latest)}</div>` : ''}
      ${c.when ? `<div class="when">${c.when.replace('T',' ').slice(0,16)}</div>` : ''}
    </div>`).join('');

  list.querySelectorAll('.conv').forEach(el =>
    el.addEventListener('click', () => openThread(el.dataset.with))
  );
}

async function openThread(withId) {
  state.openWith = withId;
  document.getElementById('layout')?.classList.add('is-thread');
  try {
    state.thread = await api('team', `/messages/thread?with_id=${withId}`);
  } catch (err) {
    state.thread = [];
  }
  renderConvList();
  renderThread();
}

function renderThread() {
  const w = state.workers.find(x => x.id === state.openWith);
  const right = $('#panelRight');
  if (!right) return;
  right.innerHTML = `
    <div class="thread-head">
      <button class="back" id="backBtn">← back</button>
      <div class="name">${esc(w?.name || '—')}</div>
    </div>
    <div class="thread-body" id="threadBody"></div>
    <form class="composer" id="composer">
      <textarea id="msgInput" placeholder="Write a message…" required></textarea>
      <button class="btn btn--primary" type="submit">send</button>
    </form>`;

  $('#backBtn').addEventListener('click', () => {
    state.openWith = null;
    document.getElementById('layout').classList.remove('is-thread');
    $('#panelRight').innerHTML = '';
  });

  const body = $('#threadBody');
  if (!state.thread.length) {
    body.innerHTML = `<div class="empty">no messages yet · say hi.</div>`;
  } else {
    body.innerHTML = state.thread.map(m => {
      const mine = m.from_id === state.me.worker_id;
      const ts = (m.created_at || '').replace('T',' ').slice(0,16);
      return `<div class="msg${mine ? ' mine' : ''}">
        <div class="meta">${esc(mine ? 'you' : m.from_name)} · ${ts}</div>
        <div class="body">${esc(m.body)}</div>
      </div>`;
    }).join('');
    body.scrollTop = body.scrollHeight;
  }

  $('#composer').addEventListener('submit', async e => {
    e.preventDefault();
    const body = $('#msgInput').value.trim();
    if (!body) return;
    try {
      await api('team', '/messages', { body: { to_id: state.openWith, body } });
      $('#msgInput').value = '';
      await openThread(state.openWith);
    } catch (err) {
      alert(`send failed: ${err.data?.detail || err.status}`);
    }
  });
}

boot();
</script>
</body>
</html>
